name: Shell Lint & Smoke Test

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    # ===========================================================================
    # JOB 1 — ShellCheck: lint estático em todos os scripts
    # ===========================================================================
    shellcheck:
        name: ShellCheck
        runs-on: ubuntu-latest

        steps:
            - name: Checkout do repositório
              uses: actions/checkout@v4

            - name: Instalar ShellCheck
              run: sudo apt-get install -y shellcheck

            - name: Listar scripts encontrados
              run: find . -name "*.sh" | sort

            - name: Executar ShellCheck
              run: |
                  find . -name "*.sh" | sort | xargs shellcheck \
                    --severity=warning \
                    --shell=bash \
                    --exclude=SC1091
                  # SC1091 — ignora aviso de 'source' de arquivo externo (utils.sh)

    # ===========================================================================
    # JOB 2 — Smoke Test: valida sintaxe e carregamento dos módulos
    # ===========================================================================
    smoke-test:
        name: Smoke Test
        runs-on: ubuntu-latest
        needs: shellcheck

        steps:
            - name: Checkout do repositório
              uses: actions/checkout@v4

            - name: Conceder permissões de execução
              run: |
                  chmod +x lumina-dev.sh
                  find scripts/ ides/ -name "*.sh" -exec chmod +x {} +

            - name: Validar sintaxe — lumina-dev.sh
              run: |
                  bash -n lumina-dev.sh && echo "✅ lumina-dev.sh"

            - name: Validar sintaxe — scripts/
              run: |
                  for f in scripts/*.sh; do
                    bash -n "$f" && echo "✅ $f" || { echo "❌ $f"; exit 1; }
                  done

            - name: Validar sintaxe — ides/
              run: |
                  for f in ides/*.sh; do
                    bash -n "$f" && echo "✅ $f" || { echo "❌ $f"; exit 1; }
                  done

            - name: Carregar utils.sh e verificar funções exportadas
              run: |
                  bash << 'TESTSCRIPT'
                    source scripts/utils.sh
                    detect_pkg_manager

                    for fn in detect_pkg_manager is_installed_cmd is_installed_pkg \
                              ensure_pkg show_lumina_header \
                              require_not_root require_sudo require_internet; do
                      if declare -f "$fn" > /dev/null; then
                        echo "✅ função: $fn"
                      else
                        echo "❌ função ausente: $fn"
                        exit 1
                      fi
                    done

                    echo "✅ PKG_MANAGER detectado: $PKG_MANAGER"
                  TESTSCRIPT

            - name: Verificar estrutura de diretórios do projeto
              run: |
                  required=(
                    "scripts/utils.sh"
                    "scripts/fonts-install.sh"
                    "scripts/claude-install.sh"
                    "scripts/gemini-install.sh"
                    "scripts/opencode-install.sh"
                    "scripts/kitty-install.sh"
                    "scripts/uninstall.sh"
                    "ides/zed-install.sh"
                    "ides/vscodium-install.sh"
                    "ides/vscode-install.sh"
                    "ides/phpstorm-install.sh"
                    "lumina-dev.sh"
                  )
                  missing=0
                  for f in "${required[@]}"; do
                    if [[ -f "$f" ]]; then
                      echo "✅ $f"
                    else
                      echo "❌ ausente: $f"
                      missing=$((missing + 1))
                    fi
                  done
                  [[ "$missing" -eq 0 ]] || exit 1

    # ===========================================================================
    # JOB 3 — Relatório final
    # ===========================================================================
    summary:
        name: Resumo
        runs-on: ubuntu-latest
        needs: [shellcheck, smoke-test]
        if: always()

        steps:
            - name: Resultado dos jobs anteriores
              run: |
                  echo "ShellCheck : ${{ needs.shellcheck.result }}"
                  echo "Smoke Test : ${{ needs.smoke-test.result }}"

                  if [[ "${{ needs.shellcheck.result }}" == "success" && \
                        "${{ needs.smoke-test.result }}" == "success" ]]; then
                    echo "✅ Todos os checks passaram."
                  else
                    echo "❌ Um ou mais checks falharam."
                    exit 1
                  fi
